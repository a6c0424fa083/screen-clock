<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0b0d;
    --fg: #f3f4f6;
    --dim: #54595f;
    --accent: #45f0a6;
    --bar-track: #1a1c1f;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    width:100%; height:100%;
    background:var(--bg);
    overflow:hidden;
    cursor:default;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
  }

  .clock{
    display:flex;
    align-items:baseline;
    justify-content:center;
    line-height:1;
    user-select:none;
    -webkit-user-select:none;
  }

  .time{
    font-weight:800;
    color:var(--fg);
    font-variant-numeric: tabular-nums;
    font-size: 32vw; /* clamp(5rem, 24vw, 22rem) */
    letter-spacing:-0.02em;
    white-space:nowrap;
  }

  .colon{
    color:var(--accent);
    margin: 0 0.02em;
    opacity: 0.12;                  /* off by default */
    transition: opacity 0.12s ease-out; /* quick fade-out after the flash */
  }
  .colon.lit{
    opacity: 1;
    transition: none;               /* snap on instantly */
  }

  @keyframes blink{
    0%, 49%{ opacity:1; }
    50%, 100%{ opacity:0.15; }
  }

  .date{
    margin-top: clamp(0.5rem, 1.5vw, 1.5rem);
    font-weight:500;
    color:var(--dim);
    font-size: 4.0vw;
    letter-spacing:0.12em;
    text-transform:uppercase;
  }

  /* seconds progress, full width hairline at the very bottom of the viewport */
  .progress-track{
    position:fixed;
    left:0; right:0; bottom:0;
    height:15px;
    background:var(--bar-track);
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:var(--accent);
    transition: width 1s linear;
  }

  /* fullscreen toggle, fades out when idle */
  .fs-btn{
    position:fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 2.6rem;
    height: 2.6rem;
    display:flex;
    align-items:center;
    justify-content:center;
    background: transparent;
    border: 1px solid var(--bar-track);
    border-radius: 6px;
    cursor:pointer;
    opacity:1;
    transition: opacity 0.5s ease, border-color 0.2s ease, transform 0.15s ease;
  }
  .fs-btn:hover{
    border-color: var(--accent);
    transform: scale(1.05);
  }
  .fs-btn:active{
    transform: scale(0.95);
  }
  .fs-btn svg{
    width: 1.1rem;
    height: 1.1rem;
    stroke: var(--dim);
    transition: stroke 0.2s ease;
  }
  .fs-btn:hover svg{
    stroke: var(--accent);
  }

  body.idle .fs-btn{
    opacity:0;
    pointer-events:none;
  }
  body.idle{
    cursor:none;
  }

  .fs-btn:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  @media (max-width: 500px){
    .fs-btn{ bottom: 1rem; right: 1rem; }
  }
</style>
</head>
<body>

  <div class="clock">
    <span class="time" aria-live="off">
      <span id="hh">--</span><span class="colon" id="colon">:</span><span id="mm">--</span>
    </span>
  </div>
  <div class="date" id="date">&nbsp;</div>

  <div class="progress-track"><div class="progress-fill" id="progress"></div></div>

  <button class="fs-btn" id="fsBtn" type="button" aria-label="Toggle full screen" title="Full screen (f)">
    <svg id="fsIconExpand" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
      <path d="M16 3h3a2 2 0 0 1 2 2v3"/>
      <path d="M8 21H5a2 2 0 0 1-2-2v-3"/>
      <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
    </svg>
    <svg id="fsIconCollapse" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
      <path d="M9 3v3a2 2 0 0 1-2 2H4"/>
      <path d="M15 3v3a2 2 0 0 0 2 2h3"/>
      <path d="M9 21v-3a2 2 0 0 0-2-2H4"/>
      <path d="M15 21v-3a2 2 0 0 1 2-2h3"/>
    </svg>
  </button>

<script>
  const hhEl = document.getElementById('hh');
  const mmEl = document.getElementById('mm');
  const colonEl = document.getElementById('colon');
  const dateEl = document.getElementById('date');
  const progressEl = document.getElementById('progress');
  const fsBtn = document.getElementById('fsBtn');
  const iconExpand = document.getElementById('fsIconExpand');
  const iconCollapse = document.getElementById('fsIconCollapse');

  const dateFmt = new Intl.DateTimeFormat(undefined, {
    weekday: 'short', year: 'numeric', month: 'short', day: '2-digit'
  });

  function pad(n){ return n.toString().padStart(2, '0'); }

  let colonFlashTimer = null;

  function render(){
    const now = new Date();
    const h = pad(now.getHours());
    const m = pad(now.getMinutes());
    const s = now.getSeconds();

    hhEl.textContent = h;
    mmEl.textContent = m;
    dateEl.textContent = dateFmt.format(now);

    // Flash colon for 200 ms, synced to this exact second tick
    clearTimeout(colonFlashTimer);
    colonEl.classList.add('lit');
    colonFlashTimer = setTimeout(() => colonEl.classList.remove('lit'), 200);

    // disable transition on the exact 0-second reset so it snaps, not sweeps backward
    if (s === 0){
      progressEl.style.transition = 'none';
      progressEl.style.width = '0%';
      // force reflow so the next frame re-enables the transition
      void progressEl.offsetWidth;
      progressEl.style.transition = 'width 1s linear';
    }
    progressEl.style.width = ((s + 1) / 60 * 100) + '%';
  }

  render();
  setInterval(render, 1000);

  // fullscreen toggle
  function isFullscreen(){
    return !!document.fullscreenElement;
  }

  function updateIcon(){
    const fs = isFullscreen();
    iconExpand.style.display = fs ? 'none' : 'block';
    iconCollapse.style.display = fs ? 'block' : 'none';
  }

  async function toggleFullscreen(){
    try{
      if (!isFullscreen()){
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    } catch(e){
      // fullscreen request can fail if not triggered by direct user gesture; ignore quietly
    }
  }

  fsBtn.addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', updateIcon);

  window.addEventListener('keydown', (e) => {
    if (e.key === 'f' || e.key === 'F'){
      toggleFullscreen();
    }
  });

  // idle handling: fade the button (and hide the cursor) after a pause in activity
  let idleTimer = null;
  function resetIdle(){
    document.body.classList.remove('idle');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      document.body.classList.add('idle');
    }, 2500);
  }
  ['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(evt => {
    window.addEventListener(evt, resetIdle, { passive: true });
  });
  resetIdle();
</script>
</body>
</html>
